# =============================================================================
# docker-compose.yml
#
# USAGE:
#   docker compose up        — pull image, download nuclear data, start Jupyter
#   docker compose down      — stop container (keeps workspace and nuclear data)
#   docker compose down -v   — stop and delete volumes (re-downloads data!)
#
# ACCESS:
#   http://localhost:8888    — no password needed
# =============================================================================

services:

  openmc-jupyter:

    # Pull pre-built image from GitHub Container Registry.
    # Replace <your-github-username> with your actual GitHub username.
    image: ghcr.io/light0vij/neutronics_vi:latest

    container_name: neutronics_vi

    ports:
      - "8888:8888"

    volumes:
      # Your notebooks — lives on your Mac, persists after container stops
      - ./workspace:/workspace

      # OpenMC result files (statepoints, tallies, plots)
      - ./results:/workspace/results

      # Nuclear data — stored in a named Docker volume so it only downloads
      # once and persists across container restarts.
      # To use existing data on your Mac replace with:
      # - /path/to/your/nuclear_data:/nuclear_data
      - nuclear_data:/nuclear_data  #

    environment:
      - OPENMC_CROSS_SECTIONS=/nuclear_data/cross_sections.xml
      - JUPYTER_ENABLE_LAB=yes

    # Adjust cpus to how many cores you want to dedicate to OpenMC runs.
    # Remove deploy block entirely to use all available resources.
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "8g"

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/lab"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  nuclear_data:
    name: neutronics_vi_nuclear_data
